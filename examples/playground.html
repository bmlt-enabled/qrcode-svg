<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>QRCode SVG Playground</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 900px;
                margin: 2rem auto;
                padding: 0 1rem;
                color: #222;
            }
            h1 {
                margin-bottom: 0.25rem;
            }
            .layout {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
                align-items: start;
            }
            .controls label {
                display: block;
                margin-bottom: 0.75rem;
                font-size: 0.9rem;
            }
            .controls input[type='text'],
            .controls textarea,
            .controls select,
            .controls input[type='number'] {
                width: 100%;
                padding: 0.5rem;
                font-size: 1rem;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
            }
            .controls textarea {
                min-height: 80px;
                font-family: inherit;
            }
            .controls input[type='color'] {
                width: 100%;
                height: 36px;
                padding: 2px;
                border: 1px solid #ccc;
                border-radius: 4px;
                background: #fff;
            }
            .row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }
            .preview {
                border: 1px solid #eee;
                border-radius: 8px;
                padding: 1rem;
                background: #fafafa;
                position: sticky;
                top: 1rem;
            }
            .preview svg {
                display: block;
                max-width: 100%;
                height: auto;
                margin: 0 auto;
            }
            .error {
                color: #b00020;
                font-size: 0.9rem;
                margin-top: 0.5rem;
            }
            .actions {
                display: flex;
                gap: 0.5rem;
                margin-top: 1rem;
                flex-wrap: wrap;
            }
            .actions button {
                flex: 1;
                min-width: 120px;
                padding: 0.5rem 0.75rem;
                font-size: 0.95rem;
                border: 1px solid #ccc;
                border-radius: 4px;
                background: #fff;
                cursor: pointer;
            }
            .actions button:hover {
                background: #f0f0f0;
            }
            .actions button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            @media (max-width: 700px) {
                .layout {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <h1>QRCode SVG Playground</h1>
        <p>Type below — the QR code updates as you type.</p>

        <div class="layout">
            <div class="controls">
                <label>
                    Content
                    <textarea id="content">Hello World!</textarea>
                </label>

                <div class="row">
                    <label>
                        Foreground
                        <input id="color" type="color" value="#000000" />
                    </label>
                    <label>
                        Background
                        <input id="background" type="color" value="#ffffff" />
                    </label>
                </div>

                <div class="row">
                    <label>
                        Error correction
                        <select id="ecl">
                            <option value="L">L (low)</option>
                            <option value="M" selected>M (medium)</option>
                            <option value="Q">Q (quartile)</option>
                            <option value="H">H (high)</option>
                        </select>
                    </label>
                    <label>
                        Padding (modules)
                        <input id="padding" type="number" min="0" value="4" />
                    </label>
                </div>

                <div class="row">
                    <label>
                        Width (px)
                        <input id="width" type="number" min="32" value="300" />
                    </label>
                    <label>
                        Height (px)
                        <input id="height" type="number" min="32" value="300" />
                    </label>
                </div>

                <div class="error" id="error"></div>
            </div>

            <div class="preview">
                <div id="container"></div>
                <div class="actions">
                    <button id="download-svg" type="button">
                        Download SVG
                    </button>
                    <button id="download-png" type="button">
                        Download PNG
                    </button>
                </div>
            </div>
        </div>

        <script type="module">
            import QRCode from '../dist/qrcode.js'

            const fields = {
                content: document.getElementById('content'),
                color: document.getElementById('color'),
                background: document.getElementById('background'),
                ecl: document.getElementById('ecl'),
                padding: document.getElementById('padding'),
                width: document.getElementById('width'),
                height: document.getElementById('height'),
            }
            const container = document.getElementById('container')
            const errorEl = document.getElementById('error')

            function render() {
                errorEl.textContent = ''
                const content = fields.content.value
                if (!content) {
                    container.innerHTML = ''
                    return
                }
                try {
                    const qrcode = new QRCode({
                        content,
                        color: fields.color.value,
                        background: fields.background.value,
                        ecl: fields.ecl.value,
                        padding: Number(fields.padding.value) || 0,
                        width: Number(fields.width.value) || 256,
                        height: Number(fields.height.value) || 256,
                        container: 'svg-viewbox',
                        join: true,
                        xmlDeclaration: false,
                    })
                    container.innerHTML = qrcode.svg()
                } catch (err) {
                    errorEl.textContent = err.message || String(err)
                }
            }

            for (const el of Object.values(fields)) {
                el.addEventListener('input', render)
            }
            render()

            function currentSvgMarkup() {
                const svg = container.querySelector('svg')
                if (!svg) return null
                const clone = svg.cloneNode(true)
                if (!clone.getAttribute('xmlns')) {
                    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg')
                }
                return new XMLSerializer().serializeToString(clone)
            }

            function triggerDownload(blob, filename) {
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = filename
                document.body.appendChild(a)
                a.click()
                a.remove()
                URL.revokeObjectURL(url)
            }

            document
                .getElementById('download-svg')
                .addEventListener('click', () => {
                    const markup = currentSvgMarkup()
                    if (!markup) return
                    triggerDownload(
                        new Blob([markup], { type: 'image/svg+xml' }),
                        'qrcode.svg',
                    )
                })

            document
                .getElementById('download-png')
                .addEventListener('click', () => {
                    const markup = currentSvgMarkup()
                    if (!markup) return
                    const width = Number(fields.width.value) || 256
                    const height = Number(fields.height.value) || 256
                    const img = new Image()
                    const svgBlob = new Blob([markup], {
                        type: 'image/svg+xml;charset=utf-8',
                    })
                    const url = URL.createObjectURL(svgBlob)
                    img.onload = () => {
                        const canvas = document.createElement('canvas')
                        canvas.width = width
                        canvas.height = height
                        const ctx = canvas.getContext('2d')
                        ctx.drawImage(img, 0, 0, width, height)
                        URL.revokeObjectURL(url)
                        canvas.toBlob((blob) => {
                            if (blob) triggerDownload(blob, 'qrcode.png')
                        }, 'image/png')
                    }
                    img.onerror = () => {
                        URL.revokeObjectURL(url)
                        errorEl.textContent = 'Failed to render PNG'
                    }
                    img.src = url
                })
        </script>
    </body>
</html>
